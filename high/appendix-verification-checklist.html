<section class="section"><div class="container"><div class="fade-up"><div class="eyebrow teal">검증 시뮬레이터</div><h2 class="section-title">이 문장을<br>과제에 써도 될까요.</h2><p class="section-sub wide">체크가 많다고 무조건 사용 가능한 것은 아닙니다. 중요한 문장은 출처와 원문을 확인해야 합니다.</p></div><div class="panel fade-up" style="margin-top:28px;"><div class="claim">“최근 연구에 따르면 청소년의 87%가 AI 학습 도구로 성적이 올랐다.”</div><div class="steps"><label><input type="checkbox" class="v" value="출처 확인"> 발행 기관·저자·날짜를 확인했다</label><label><input type="checkbox" class="v" value="원문 대조"> AI 요약과 원문이 같은지 봤다</label><label><input type="checkbox" class="v" value="교차 검증"> 다른 자료에서도 같은 수치를 확인했다</label><label><input type="checkbox" class="v" value="권리 확인"> 인용·개인정보 문제가 없는지 확인했다</label><label><input type="checkbox" class="v" value="AI 표시"> AI가 도운 부분을 표시했다</label></div><button class="btn btn-primary" type="button" id="judge" style="margin-top:16px;">판정하기</button><div class="output" id="judgeOut">확인한 항목을 체크한 뒤 판정하세요.</div></div></div></section>

<script>judge.onclick=()=>{const c=[...document.querySelectorAll('.v:checked')].length;judgeOut.textContent=c>=3?'조건이 일부 갖춰졌습니다. 그래도 87% 수치는 원문과 조사 대상을 확인한 뒤에만 사용할 수 있습니다.': '아직 사용 보류입니다. 수치, 연구, 최근 같은 말은 출처와 원문 확인 전에는 과제에 쓰지 않습니다.'}</script><script src="../js/main.js"></script></body></html>
