<style>.panel{background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:24px;box-shadow:0 14px 40px rgba(15,23,42,.08)}.form{display:grid;gap:14px}.form label{font-size:14px;font-weight:900;color:var(--dark)}.form input,.form textarea,.form select{width:100%;margin-top:8px;border:1px solid #CBD5E1;border-radius:8px;padding:12px 14px;font:inherit}.form textarea{min-height:92px}.output{margin-top:16px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:16px;line-height:1.8;color:var(--gray)}</style>
<section class="section"><div class="container"><div class="fade-up"><div class="eyebrow green">기록 생성기</div><h2 class="section-title">과제 마지막에 붙일<br>AI 사용 표시를 만듭니다.</h2></div><div class="panel fade-up" style="margin-top:28px;"><div class="form"><label>과제 종류<select id="kind"><option>보고서</option><option>발표</option><option>토론 준비</option><option>진로 탐구</option></select></label><label>AI 사용 범위<textarea id="scope" placeholder="예: 쟁점 후보와 반론 예시를 탐색했다"></textarea></label><label>내가 검증·수정한 내용<textarea id="work" placeholder="예: 통계는 제외하고 공식 자료로 개념을 다시 확인했다"></textarea></label><button class="btn btn-primary" type="button" id="makeUse">표시 문구 만들기</button><div class="output" id="useOut">칸을 채우면 제출 문구가 만들어집니다.</div></div></div></div></section>

<script>makeUse.onclick=()=>{useOut.textContent=scope.value&&work.value?`AI 사용 표시: 이 ${kind.value}에서 생성형 AI는 “${scope.value.trim()}”에 활용했다. 최종 내용에서는 “${work.value.trim()}”을 직접 수행했으며, 최종 판단과 책임은 작성자에게 있다.`:'AI 사용 범위와 내가 한 일을 모두 적어 주세요.'}</script><script src="../js/main.js"></script></body></html>
