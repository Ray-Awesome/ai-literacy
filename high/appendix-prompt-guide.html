<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>고등 프롬프트 설계 — ailit</title><meta name="description" content="고등 학습자이 보고서·발표·토론에 쓸 검증 가능한 프롬프트를 직접 설계하는 활동입니다."><link rel="stylesheet" href="../css/style.css"></head>
<body><div class="progress-bar"></div><header class="site-header"><div class="nav-inner"><a href="../index.html" class="nav-logo"><img src="../images/logo2w.png" alt="AILIT AI Literacy Media"></a><nav class="nav-links"><a href="../elementary/index.html">초등</a><a href="../middle/index.html">중등</a><a href="index.html" class="active">고등</a><a href="../teacher/index.html">교사 허브</a><a href="../thinking-tools/index.html">사고 도구</a></nav><button class="nav-toggle" aria-label="메뉴"><span></span><span></span><span></span></button></div><nav class="mobile-menu"><a href="../elementary/index.html">초등</a><a href="../middle/index.html">중등</a><a href="index.html" class="active">고등</a><a href="../teacher/index.html">교사 허브</a></nav></header>
<section class="hero-sub-page" style="background:linear-gradient(135deg,#1E3A6E 0%,#2563EB 100%);"><div class="container hero-content"><span class="hero-badge" style="background:rgba(255,255,255,.18);color:#DBEAFE;">부록 01</span><h1 class="hero-title" style="font-size:clamp(32px,5vw,50px);">고등 프롬프트 설계</h1><p class="hero-sub" style="font-size:16px;">AI에게 답을 맡기는 대신, 목적·조건·검증 기준을 직접 설계합니다.</p></div></section>
<style>.panel{background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:24px;box-shadow:0 14px 40px rgba(15,23,42,.08)}.form{display:grid;gap:14px}.form label{font-size:14px;font-weight:900;color:var(--dark)}.form input,.form select,.form textarea{width:100%;margin-top:8px;border:1px solid #CBD5E1;border-radius:8px;padding:12px 14px;font:inherit}.form textarea{min-height:92px;line-height:1.7}.output{margin-top:16px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:16px;line-height:1.8;color:var(--gray)}.check{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:14px}.check button{border:2px solid #E2E8F0;border-radius:8px;background:#fff;padding:12px;font-weight:900;cursor:pointer}.check button.on{border-color:var(--teal);background:#CCFBF1}@media(max-width:760px){.check{grid-template-columns:1fr}}</style>
<section class="section"><div class="container"><div class="fade-up"><div class="eyebrow navy">설계</div><h2 class="section-title">보고서용 프롬프트를<br>직접 만듭니다.</h2><p class="section-sub wide">고등 과정에서는 질문을 잘하는 것보다, 답변을 어떻게 검증할지까지 함께 요청하는 것이 중요합니다.</p></div><div class="panel fade-up" style="margin-top:28px;"><div class="form"><label>과제 주제<input id="topic" placeholder="예: 생성형 AI가 청소년 학습에 미치는 영향"></label><label>AI에게 맡길 일<select id="task"><option>쟁점 후보 정리</option><option>반론 예상</option><option>개념 설명</option><option>목차 초안</option></select></label><label>반드시 지킬 조건<textarea id="limits" placeholder="예: 통계는 단정하지 말고, 확인할 출처 유형을 함께 제안할 것"></textarea></label><div class="check"><button type="button" class="tag">출처 유형 포함</button><button type="button" class="tag">반론 포함</button><button type="button" class="tag">AI 한계 표시</button></div><button class="btn btn-primary" type="button" id="makePrompt">프롬프트 생성</button><div class="output" id="out">칸을 채우면 검증 가능한 프롬프트가 만들어집니다.</div></div></div></div></section>
<section class="section-sm bg-light"><div class="container" style="display:flex;gap:12px;flex-wrap:wrap;"><a href="index.html" class="btn btn-outline">고등 코스</a><a href="appendix-verification-checklist.html" class="btn btn-primary">다음 →</a></div></section>
<footer class="site-footer"><div class="footer-inner"><div class="footer-bottom"><span>© 2026 ailit. · <a href="https://ailiteracy.or.kr" style="color:inherit;">ailiteracy.or.kr</a></span><span><a href="../index.html" style="color:#64748B;">홈으로</a></span></div></div></footer>
<script>document.querySelectorAll('.tag').forEach(b=>b.onclick=()=>b.classList.toggle('on'));makePrompt.onclick=()=>{const tags=[...document.querySelectorAll('.tag.on')].map(b=>b.textContent).join(', ');out.textContent=topic.value&&limits.value?`고등 학습자 보고서 멘토처럼 “${topic.value.trim()}” 주제에 대해 ${task.value}를 도와줘. 조건: ${limits.value.trim()}. 추가로 ${tags||'확인할 쟁점'}을 포함하고, 과제에 바로 쓰기 전 내가 검증해야 할 항목을 따로 표시해줘.`:'주제와 조건을 먼저 입력하세요.'}</script><script src="../js/main.js"></script></body></html>
