<section class="hero-sub-page" style="background:linear-gradient(135deg,#7C3AED 0%,#1E3A6E 100%);"><div class="container hero-content"><span class="hero-badge" style="background:rgba(255,255,255,.18);color:#EDE9FE;">부록 04</span><h1 class="hero-title" style="font-size:clamp(32px,5vw,50px);">고등 AI 리터러시 자가진단</h1><p class="hero-sub" style="font-size:16px;">내가 AI 답변을 묻고 검증하고 책임 있게 설명할 수 있는지 확인합니다.</p></div></section>
<style>.panel{background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:24px;box-shadow:0 14px 40px rgba(15,23,42,.08)}.q{display:grid;gap:8px;margin-bottom:18px}.q strong{color:var(--dark)}.q select{border:1px solid #CBD5E1;border-radius:8px;padding:10px;font:inherit}.output{margin-top:16px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:16px;line-height:1.8;color:var(--gray)}</style>
<section class="section"><div class="container"><div class="fade-up"><div class="eyebrow navy">자가진단</div><h2 class="section-title">점수보다<br>다음 행동을 찾습니다.</h2><p class="section-sub wide">각 문항을 1~4점으로 고릅니다. 결과는 등급이 아니라 다음 과제에서 보완할 행동을 정하는 데 씁니다.</p></div><div class="panel fade-up" style="margin-top:28px;" id="diag"></div></div></section>
<section class="section-sm bg-light"><div class="container" style="display:flex;gap:12px;flex-wrap:wrap;"><a href="appendix-ai-use-log.html" class="btn btn-outline">← 이전</a><a href="index.html" class="btn btn-primary">고등 코스</a></div></section>
<footer class="site-footer"><div class="footer-inner"><div class="footer-bottom"><span>© 2026 ailit. · <a href="https://ailiteracy.or.kr" style="color:inherit;">ailiteracy.or.kr</a></span><span><a href="../index.html" style="color:#64748B;">홈으로</a></span></div></div></footer>
<script>
const qs=['목적·조건·검증 기준을 넣어 프롬프트를 설계할 수 있다.','AI 답변의 핵심 주장과 근거를 분리할 수 있다.','출처, 원문, 교차 검증을 순서대로 실행할 수 있다.','저작권·개인정보·초상권 위험을 확인할 수 있다.','AI 사용 범위와 내 판단 범위를 과제에 표시할 수 있다.','AI 답변을 그대로 쓰지 않고 수정·폐기 이유를 설명할 수 있다.'];qs.forEach((q,i)=>diag.insertAdjacentHTML('beforeend',`<div class="q"><strong>${i+1}. ${q}</strong><select class="score"><option value="1">1 아직 어렵다</option><option value="2">2 부분적으로 가능하다</option><option value="3">3 대체로 가능하다</option><option value="4">4 근거와 함께 가능하다</option></select></div>`));diag.insertAdjacentHTML('beforeend','<button class="btn btn-primary" type="button" id="calc">결과 보기</button><div class="output" id="res">점수를 고른 뒤 결과를 확인하세요.</div>');calc.onclick=()=>{const sum=[...document.querySelectorAll('.score')].reduce((a,s)=>a+Number(s.value),0);res.textContent=sum>=21?'심화 과제에 들어갈 준비가 됐습니다. 다음 과제에서는 AI 사용 표시 문구까지 남기세요.':sum>=15?'기본 역량은 있습니다. 검증 체크리스트에서 낮은 항목을 다시 연습하세요.':'프롬프트 설계와 출처 검증부터 다시 연습하는 것이 좋습니다.'};
</script><script src="../js/main.js"></script></body></html>
