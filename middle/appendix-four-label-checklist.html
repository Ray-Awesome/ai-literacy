<style>.panel{background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:24px;box-shadow:0 14px 40px rgba(15,23,42,.08)}.statement{font-size:22px;font-weight:900;line-height:1.6;color:var(--dark);background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:18px}.choices{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:18px}.choices button{border:2px solid #E2E8F0;border-radius:8px;background:#fff;padding:14px;font-weight:900;cursor:pointer}.choices button.correct{border-color:var(--teal);background:#CCFBF1}.choices button.wrong{border-color:#FDBA74;background:#FFF7ED}.feedback{margin-top:16px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:16px;color:var(--gray);line-height:1.8}@media(max-width:760px){.choices{grid-template-columns:1fr 1fr}}</style>
<section class="section"><div class="container"><div class="fade-up"><div class="eyebrow blue">분류 퀴즈</div><h2 class="section-title">이 문장은<br>어떤 종류일까요.</h2><p class="section-sub wide">문장을 읽고 가장 알맞은 분류를 고릅니다. 답보다 중요한 것은 왜 그렇게 나누는지 이해하는 것입니다.</p></div><div class="panel fade-up" style="margin-top:28px;"><div class="statement" id="statement"></div><div class="choices" id="labelChoices"></div><div class="feedback" id="labelFeedback">알맞은 분류를 선택하세요.</div><button class="btn btn-primary" type="button" id="nextLabel" style="margin-top:16px;">다음 문장</button></div></div></section>

<script>
const items=[{s:'대한민국의 수도는 서울이다.',a:'사실',e:'지도나 공공 자료로 확인할 수 있습니다.'},{s:'이 앱은 앞으로 더 많은 학생이 쓰게 될 것이다.',a:'추정',e:'근거가 있을 수 있지만 미래 일이라 확정은 아닙니다.'},{s:'AI는 학생에게 가장 좋은 공부 도구다.',a:'의견',e:'좋다, 가장 좋다 같은 평가는 관점이 들어간 말입니다.'},{s:'전문가들은 87%가 효과를 봤다고 말했다.',a:'미확인',e:'전문가가 누구인지, 어떤 조사인지 출처가 없습니다.'}];const labels=['사실','추정','의견','미확인'];let idx=0;function render(){const it=items[idx];statement.textContent=it.s;labelChoices.innerHTML='';labelFeedback.textContent='알맞은 분류를 선택하세요.';labels.forEach(l=>{const b=document.createElement('button');b.textContent=l;b.onclick=()=>{labelChoices.querySelectorAll('button').forEach(x=>x.className='');b.className=l===it.a?'correct':'wrong';labelFeedback.textContent=l===it.a?`맞아요. ${it.e}`:`다시 생각해요. 이 문장은 “${it.a}”에 더 가깝습니다. ${it.e}`};labelChoices.appendChild(b)})}nextLabel.onclick=()=>{idx=(idx+1)%items.length;render()};render();
</script><script src="../js/main.js"></script></body></html>
