<section class="hero-sub-page" style="background:linear-gradient(135deg,#3B82F6 0%,#1E3A6E 100%);"><div class="container hero-content"><span class="hero-badge" style="background:rgba(255,255,255,.18);color:#DBEAFE;">부록 03</span><h1 class="hero-title" style="font-size:clamp(32px,5vw,50px);">AI 사용 기록 만들기</h1><p class="hero-sub" style="font-size:16px;">AI를 썼다는 사실보다, 무엇을 맡기고 무엇을 직접 했는지 남깁니다.</p></div></section>
<style>.panel{background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:24px;box-shadow:0 14px 40px rgba(15,23,42,.08)}.form{display:grid;gap:14px}.form label{font-size:14px;font-weight:900;color:var(--dark)}.form input,.form select,.form textarea{width:100%;margin-top:8px;border:1px solid #CBD5E1;border-radius:8px;padding:12px 14px;font:inherit}.form textarea{min-height:90px;line-height:1.7}.output{margin-top:16px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:16px;line-height:1.8;color:var(--gray)}</style>
<section class="section"><div class="container"><div class="fade-up"><div class="eyebrow blue">기록 생성</div><h2 class="section-title">내 AI 사용 과정을<br>문장으로 남겨요.</h2><p class="section-sub wide">과제에 AI를 사용했다면 사용 목적, 참고한 부분, 내가 수정한 부분을 구분해 씁니다.</p></div><div class="panel fade-up" style="margin-top:28px;"><div class="form"><label>사용 목적<input id="goal" placeholder="예: 발표 주제 아이디어 찾기"></label><label>입력한 질문<textarea id="prompt" placeholder="내가 실제로 입력한 질문"></textarea></label><label>참고한 부분<input id="used" placeholder="예: 목차 후보 2개"></label><label>내가 직접 한 일<input id="mine" placeholder="예: 자료 확인, 문장 수정, 사례 삭제"></label><button class="btn btn-primary" type="button" id="makeLog">기록 만들기</button><div class="output" id="logOutput">칸을 채우면 제출용 기록 문장이 만들어집니다.</div></div></div></div></section>
<section class="section-sm bg-light"><div class="container" style="display:flex;gap:12px;flex-wrap:wrap;"><a href="appendix-four-label-checklist.html" class="btn btn-outline">← 이전</a><a href="index.html" class="btn btn-outline">중등 코스</a><a href="appendix-self-check.html" class="btn btn-primary">다음 →</a></div></section>

<script>makeLog.onclick=()=>{const vals=[goal.value.trim(),prompt.value.trim(),used.value.trim(),mine.value.trim()];logOutput.textContent=vals.every(Boolean)?`AI 사용 기록: 나는 “${vals[0]}”을 위해 AI를 사용했다. 입력한 질문은 “${vals[1]}”이었다. AI 답변 중 “${vals[2]}”만 참고했고, 최종 결과에서는 “${vals[3]}”을 직접 했다.`:'모든 칸을 채워 주세요.'}</script><script src="../js/main.js"></script></body></html>
