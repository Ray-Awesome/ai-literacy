<body><div class="progress-bar"></div><header class="site-header"><div class="nav-inner"><a href="../index.html" class="nav-logo"><img src="../images/logo2w.png" alt="AILIT AI Literacy Media"></a><nav class="nav-links"><a href="../elementary/index.html">초등</a><a href="index.html" class="active">중등</a><a href="../high/index.html">고등</a><a href="../teacher/index.html">교사 허브</a><a href="../thinking-tools/index.html">사고 도구</a></nav><button class="nav-toggle" aria-label="메뉴"><span></span><span></span><span></span></button></div><nav class="mobile-menu"><a href="../elementary/index.html">초등</a><a href="index.html" class="active">중등</a><a href="../high/index.html">고등</a><a href="../teacher/index.html">교사 허브</a></nav></header>
<section class="hero-sub-page" style="background:linear-gradient(135deg,#3B82F6 0%,#1E3A6E 100%);"><div class="container hero-content"><span class="hero-badge" style="background:rgba(255,255,255,.18);color:#DBEAFE;">부록 04</span><h1 class="hero-title" style="font-size:clamp(32px,5vw,50px);">중등 AI 리터러시 자가진단</h1><p class="hero-sub" style="font-size:16px;">내가 AI를 묻고, 분류하고, 안전하게 쓰는 습관을 확인합니다.</p></div></section>
<style>.panel{background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:24px;box-shadow:0 14px 40px rgba(15,23,42,.08)}.q{display:grid;gap:8px;margin-bottom:18px}.q strong{color:var(--dark)}.q select{border:1px solid #CBD5E1;border-radius:8px;padding:10px;font:inherit}.output{margin-top:16px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:16px;line-height:1.8;color:var(--gray)}</style>
<section class="section"><div class="container"><div class="fade-up"><div class="eyebrow blue">자가진단</div><h2 class="section-title">지금 내 습관을<br>점수로 확인해요.</h2><p class="section-sub wide">1점은 아직 어렵다, 4점은 잘할 수 있다입니다. 점수는 등급이 아니라 다음에 연습할 부분을 찾는 힌트입니다.</p></div><div class="panel fade-up" style="margin-top:28px;" id="checkPanel"></div></div></section>
<section class="section-sm bg-light"><div class="container" style="display:flex;gap:12px;flex-wrap:wrap;"><a href="appendix-ai-use-log.html" class="btn btn-outline">← 이전</a><a href="index.html" class="btn btn-primary">중등 코스</a></div></section>
<footer class="site-footer"><div class="footer-inner"><div class="footer-bottom"><span>© 2026 ailit. · <a href="https://ailiteracy.or.kr" style="color:inherit;">ailiteracy.or.kr</a></span><span><a href="../index.html" style="color:#64748B;">홈으로</a></span></div></div></footer>
<script>
const qs=['목적과 조건을 넣어 AI에게 질문할 수 있다.','AI 답변 문장을 사실·추정·의견·미확인으로 나눌 수 있다.','출처가 필요한 문장을 찾을 수 있다.','개인정보를 빼고 질문할 수 있다.','AI가 한 일과 내가 한 일을 구분해 말할 수 있다.'];const panel=document.getElementById('checkPanel');qs.forEach((q,i)=>{panel.insertAdjacentHTML('beforeend',`<div class="q"><strong>${i+1}. ${q}</strong><select class="score"><option value="1">1 아직 어렵다</option><option value="2">2 조금 할 수 있다</option><option value="3">3 대체로 할 수 있다</option><option value="4">4 잘할 수 있다</option></select></div>`)});panel.insertAdjacentHTML('beforeend','<button class="btn btn-primary" type="button" id="calc">결과 보기</button><div class="output" id="result">점수를 고른 뒤 결과를 확인하세요.</div>');calc.onclick=()=>{const sum=[...document.querySelectorAll('.score')].reduce((a,s)=>a+Number(s.value),0);result.textContent=sum>=17?'좋아요. 다음에는 실제 과제에서 AI 사용 기록을 남겨 보세요.':sum>=12?'기본은 잡혔습니다. 낮게 준 문항 하나를 골라 다시 연습하세요.':'아직 연습할 부분이 많습니다. 먼저 질문 만들기와 4분법 분류부터 다시 해보세요.'};
</script><script src="../js/main.js"></script></body></html>
